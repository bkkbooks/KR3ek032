body:
  text: 一枕藏外科諸症第一形圖此圖內有二病上名肝脾肺發背下名蓮子穿心發背肝脾肺發背長一尺闊八寸深五寸三分雖潰至骨而膜不穿者不死此症因飲食受濕熱之毒在脾膜之間然脾至內易作臭惡膿血急服追疔奪命湯次用化毒消腫托裡散再用內托千金散中敷解毒生肌定痛散外四邊甫鐵箍拔毒散以雞蛋青或蜜調貼不時用水濕淘不可令圍藥乾燥暑熱天日洗數次急須內外夾攻後收口用生肌膏蓮子穿心發背發於中背右脾毒若攻心十無一生急用千金化毒湯日服三四貼外加圍藥不令攻心一或走透通背皆腫則不可救小者可治夫諸痛瘡癢皆發於心火蓋心主血而行氣凡走透瘡互皆有至養成病急於至癘上打火針三四次為妙急用化毒消腫托裡散加南星草烏木鱉貝母大蒜生薑汁米醋日夜敷之留中頭時以醋潤濕二三日即消蓋心至血而行氣氣滯血凝而或癰疽也癰壅也疽陷也癰屬陽大而高竇六腑不和之所致也疽屬陰平而內陷五臟不不和之所成也第二形圖此圖名蜂窠發背宜急治不急治則穿膜必死此症頭在上發最為逆惡十不治一務要仔細用藥不得緩視切須查忌生冷毒物急用千金托裡散三四帖復用化毒消腫托裡散外四邊用鐵箍散內用生肌定痛散恐毒攻入心膜也第三形圖此圖名散走流注發背症因風盛生熱熱極所致毒因熱極乖風而四面沸騰急宜疏風散熱則血和氣順毒自止矣然用藥如救然援溺若流走四肢及穿膜必死第四形圖此圖名兩頭髮背似滿天星斗十不救一此症受飲食之毒致之氣與食沖相合因虛而成氣虛而走散所以瘡口開闊急須內消亦宜補陽也外敷神方鐵箍散後用千金內托散又用二十四味化毒流氣飲瘡須用乳香定痛散亦用仙方紅子膏收其膿第五形圖此圖名腎俞發背亦名穿心發背此症受濕熱邪氣而成毒及氣怒酒色過度或飲熱酒傷腎腎中濕熱毒壅流於腎俞急須內外夾攻服藥數帖以解之後用生肌藥若陰發而傷腎膜者難治服藥當以柴胡獨活湯第六形圖此圖有二症上名脾癰下名腎俞雙發脾癰發於左膊之間用燈火粹打破後服追疔奪命湯汗出為效腎俞雙發酒色過度苦於惱怒受濕熱而成毒陽發外腫可治陰發內陷而潰腎膜膿清稀者難治當服艽活歸芍湯第七形圖此圖右搭手發於右肩骨上動轍之處若串左肩難治宜用摻敷藥於外服湯藥於內或真人活命飲或千金內托止痛散第八形圖形圖左搭肩發於左肩能動之處可治難愈串於右肩尤為難矣用雞黃皮及絮焙焦研末有膿乾摻無膿清油和敷湯藥同於右雞黃皮即肫內之黃皮絮即雞之裝食肐袋也第九形圖此圖有三症曰穿心發曰左肋疽曰右腸疽治法俱同但穿心發發於心名曰井疽方書云井疽如豆大三四日起不急治下流入腹十日當危此症因食生冷及自死牛馬豬羊毒肉即結熱毒於臟腑若以氣塊氣癖治之誤矣此蓋寒抑熱極而腫也急用千金托裡散外用神方鐵箍散甫定再用二十四味化毒活血流氣飲第十形圖此圖背後對心發蓋心火熱盛而食生冷若寒柳熱毒鬱極而流走及串肩者急用疏導心火活血通氣之劑然後用清心定痛生肌藥敷之又服化毒消腫湯次用千金托裡內消散外四邊敷鐵箍拔毒散第十一形圖此圖男乳蜂窠發胸通心乳之間心火盛熱毒迅急用疏導心火稍遲則熱毒攻心必死先服化毒消腫散外敷拔毒鐵箍散忌刀針再服千金內托散當歸連翹散瘡頂以保生錠敷之生肌定痛散洗之第十二形圖此圖名後心蜂窠發背灼赤腫痛者可治若流注兩肩則難治矣內服外敷治法與男乳蜂窠發背相同第十三形圖此圖名兩脅發疽因內傷而氣虛切忌補陽助熱之劑恐熱太盛傷骨及膜宜服柴胡青皮桔梗飲第十四形圖此圖鬢際及頸後兩邊與左右鬢邊初起如核者急宜取去病根若腦心發者熱毒上及於腦四邊掀赤腫硬連於耳項寒熱疼痛不急救則氣血滯毒熾膿潰頭面腐矣此圖五發為疽右為瘦宜服追疔奪命湯四五帖後服生肌定痛托裡散第十五形圖此圖乳發即乳癖有兒外吹有孕內吹有孕以內托流氣飲用之無孕用千金化毒湯敷以鐵箍散若出膿用生肌定痛散敷之此症受於肝肺憂怒之郁悲恩之氣及飲食之毒凡寒暑濕之所成也番花榴髮乳曰崖崩者乳房傷壞矣三十二三可治四十以上不急治則危急用流氣飲托裡散上宣湯中用解毒生肌散再服復元通氣散第十六形圖此圖腦後發疽大而紫黑色不急救則熱毒流於淵腋前傷任脈內攻心肝肺臟十日危矣急用化毒消腫托裡散及內托千金散生肌定痛散痛甚再加乳香定痛散瘡頭上敷生肌長肉散四邊敷鐵箍散第十七形圖此圖耳後友離耳一寸三分一名揩口疽又名發頤其毒其銳生於致命之處也以其毒攻喉下故曰銳毒其毒上攻連頤而穿口者必穿喉而死急用千金化毒湯乳香定痛散又用二十四味活血流氣飲外敷鐵箍散石氣筋血等瘦生於頭面等處大如拳小如慄或軟或硬不疼痛不發寒熱切忌刀針砭炙宜服海藻散破血散忌一切毒物及生冷甘辛魚腥藥物第十八形圖此圖名九發曰中府曰巨闕曰中脘曰期門曰章門曰天樞曰丹田曰關元曰京門驗其膜之穴而審部其所食何物看其氣之虛實毒之淺深大小穿潰出處可治內傷膜腸大便出膿者難矣急用千金托裡散化毒湯追疔奪命湯二十四味活血流氣飲第十九形圖此圖人面瘡生肘關節與膝頭處急服流氣飲外不愈者以苦參湯補其腎又敷解毒生肌定痛散後用膏藥並生肌散甫之第二十形圖此圖有三症臀上生疽近大小便處難治生於實處可治急服內托流氣飲腿上生血風瘡男上生下女下生上頑毒難愈其瘡遊走上腳即腳發背急用鐵箍散苦參丸二十四味活血流氣飲外臁瘡腎虛濕熱之毒下注亦脾腎濕熱用苦參丸敷以解毒生肌定痛散後用隔紙膏附臁瘡方黃蠟五錢玲珍珠二分象牙燒質五分花椒少許潮腦香油適量煎膏用油紙攤膏帖上神效又經驗臁瘡神方頭髮灰小酒粬百草霜銅綠以上四味各半酒盅惟銅綠略少共和勻調香用桑麻紙攤膏藥帖之不可露藥一張即愈多年成漏者三五日一換先用茶洗淨帖藥四圍遮嚴切勿漏藥慎之第二十一形圖此圖有二病懸癰腎陰發乃腎受寒濕日久鬱熱邪凝經絡氣血阻礙宜服托裡散若陰囊腫硬者雖屬膀胱經受病大約治法亦同但加車前子木通淡竹葉牽牛何首烏發背脊上長者為黃瓜毒園者為甜瓜毒長尺二三寸皮不紅高突二寸急痛上頭大者為逆下頭大者為順急用千金化毒湯以散熱毒不使成膿又用鐵箍散以雞蛋清蜂蜜廣膠同和黏之留口泄毒第二十二形圖此圖有二症上兩搭下雙搭即上兩搭和臀腿雙搭上搭病源治法列於二十四圖內下雙搭若略生上些即腎俞雙發因酒色肆欲濕鬱化熱主陽發在外可治如發寒熱為陰發陰發傷腎膜膿水清稀者為血氣虛難治宜服追疔奪命湯柴胡獨活湯左右臀腿雙發初起可用燈火打破急服追疔奪命湯用千金托裡散第二十三形圖此圖左上搭亦名上串若偏於右脅之間即名脾癰脾胃不和氣血凝滯故發肩背脊間能動之處可治連肩骨串右者難治老弱者十不治一急用千金化毒湯消腫托裡散後用流氣飲外敷鐵箍散解毒生肌定痛散瘡頭用紅子膏收其膿水熱天用蔥椒湯日洗二三次再用雞肫內黃皮及嗉袋烙干為末濕則揩乾調麻油塗之第二十四形圖此圖右上搭亦名串上連肩骨串左者難治治法與左上搭大同附背搭一切惡瘡危者用鮮桑葉連枝袁煙將人置板上板鑿一孔露瘡在外薰片時即化水而愈第二十五形圖此圖有二症上名兩搭肩下名左右脅疽蓋因胃虛氣虛而成切忌補陽助熱之藥蓋虛而得熱藥熱虛熱愈盛傷其脾膜也急用追疔奪命湯化毒活血湯外敷鐵箍散頂敷生肌定痛散日用七寶湯煎洗二三次第二十六形圖此圖有二症上名肩癰搭肩病源治法參二十五圖下名穿脅疽但因風毒入骨日久覺皮膚麻骨痛發於腰脅間急用化毒消腫托裡散外用鐵散次用千金托裡散上敷生肌定痛散膿多可用收膿消毒膏遲則不救第二十七形圖此圖對口疽又名頭後蜂窠發流串肩者名上搭肩流串背者名偏搭背難治上搭肩病源治法列於二十三形圖內偏背搭病源治法列於第一形圖內此對口疽發於腦後焮赤腫突急用鐵箍散服追疔奪命湯一二帖消腫化毒湯活血化毒湯二三帖第二十八形圖此圖佛腦疽生頂門上又名魚眼疔外敷鐵箍散內服追疔奪命湯二三帖出汗為度無汗可用保生錠再用飛龍奪命丹若毒攻心肺三日必死第二十九形圖此圖發腦疽因風前久睡熱毒入腦發腫五六日可治半月二十日遲危矣恐穿膜通腦也急用追疔奪命湯千金托裡散化毒消腫散外敷鐵箍散中敷生肌定痛散切忌風入瘡口歹毒食發物入風不治初起如粒水四邊焮腫醒毒連於耳頂寒熱苦痛不急治毒攻內血肉腐爛作膿從頭中出者必死第三十形圖此圖鰍肚疔在上天蛇頭在腳地蛇頭中節鰍肚疔指頭蛇頭指頭側蛇腮骨節處為寸手足通於心腹急用鐵箍散追疔奪命湯若三節黑爛必落或傷命總之毒氣攻一面發毒黃者難治一方生黃豆口嚼極爛敷患處一切蛇頭惡毒自愈疔疽腫毒加綠豆第三十一形圖此圖紅絲疔又名急疔先生於手足心腋間如黃豆大其色紅白水泡樣根行如箭一日夜行一尺二三寸紅絲之延生至口中者死急用針刺絲頭入四五分出黑紫血可安急服追疔奪命湯三四帖除根第三十二形圖此名脈骨疔又名魚口疽生於臂為指疽往下為魚口在手掌後即脈骨疔根行紅絲者為疽黑者為疔急用鐵箍散千金化毒湯中敷生肌定痛散第三十三形圖此圖手發背生筋服之處十指連心痛不可忍色黑而臭者毒攻心矣必死紅者可治先用蔥椒湯洗去爛黑肉敷乳香定痛散貼乳香拔毒膏再敷生肌定痛散服乳香化毒湯三四帖又用千金托裡散排膿生肌第三十四形圖此圖腳發背色黑者死色赤消渴病久者生治法與手同腳發生於腳後脫甲疽生於腳趾甲疽色赤面不黑有膿水者可治初發時急用流氣飲苦參丸解毒生肌散又用桐油煎無名異一沸入花椒一撮次入蓼葉七日取用第三十五形圖此圖穿心疔又名丹疽生腳底心串腳面者十不治一外用鐵箍散中敷乳香定痛散服追疔奪命湯千金托裡散化毒祛風如出膿散氣者愈不出膿用血竭點破之第三十六圖形此圖有三疽上名腐骨疽下名貼骨疽又名魚肚疽腐骨疽生大腿其骨硬腫如石此多風濕之毒亦因久坐久眠受風濕日久不得發散其血被汙濁而結滯宜及早治之遲必腐爛成膿服千金托裡散若骨外現高出其皮不太發熱按之不隨手起者即有膿矣即用三稜針刺入三四寸到骨至根放膿後服下宣散五七帖見有黃水出即愈注意病後調養謹忌百日可也貼骨疽魚肚疽久坐久眠久處濕地風濕透骨而出經半月不治毒必攻心難矣若至一月內外不出者用火針刺出膿血治法同上腳生血風瘡頑毒難愈其瘡遊走上腳即腳發背急用鐵箍散內服苦參丸活血解毒丸後用二十四味流氣飲日用蔥椒湯洗二三次桔梗袖葉煎湯浸泡溺後服九仙散第三十七形圖此圖名青蛇咬又名咬骨疽生小腿股上頭向上生攻走入肚者不治尾向上易治急宜表治服二十六味救苦化堅湯外敷鐵箍散用薑汁陳醋豬膽和調蛇頭上用三稜針刺入二寸出黑紫血方可出針再將保生錠用酒送入自消第三十八形圖此圖肉烏龜生腹背脅開皮不紅離起二寸頭向上攻心口疼痛向下滿足如刀割頭左右亦其疼痛其用針刺其四足尾尻上用艾炙之頭上多炙二十四壯即不疼不痛其龜死矣但針不可便去待炷香盡去之再服消氣化毒湯第三十九形圖此圖黃鰍癰又名黃鰍生小腿肚皮裡膜外或腿上皮面不紅里硬如石長七八寸頭大尾小急用三稜針刺中腹後刺尾上二寸之處再刺其頭艾炙頭上二三十壯炷香消盡方可去尾針左右背針五七次不疼不痛便起針如再動而痛照前針灸治法與三十七形圖大同第四十形圖此圖老鼠攢又名脾癰生於肩脅間色不紅如鼠大小不一七八日不成膿者可治成膿者十不治一多生於小兒蓋因受胎毒而又失乳多啖食不節米麵發氣不能克化此作寒作熱日夜骨蒸久不安寧遂生此症發於皮裡膜外如流注狀先用流氣發散之藥後用二十四味化毒流氣飲第四十一形圖此圖肉蝴蜂肉刺生遍身或於足間不紅此蜂一痛直攻入心口用七味硇砂散敷之外用萬應膏貼之勿著好肉貼三日後取下其蜂如臭而後再以萬應膏貼之第四十二形圖此圖盤蛇癧又名沿朱癧因吃刺激物或吃被蛇蟲鼠蠍爬過的隔夜食物而受其毒遂生此癧先服三屑散二帖引從小水出再服清生散靈砂散三四帖如不消再用四五帖第四十三形圖此圖小腹癰又名丹毒癰生於小腹陰交相對小腹側縫間不穿膜可治與橫痃同若穿必成漏矣急用千金化毒湯金龍十宣湯生肌解毒定痛散再用乳香隔紙膏一日換二三次去其膿用蔥椒湯天熱洗二三次天涼洗一次第四十四形圖此魚口疽又名橫痃生腿腕縫間內臁膀胱上因色欲過度走動勞苦或垢精穢氣不淨毒攻心肝腎臟然肝經之傷也先生下疳先生便毒媾精房勞也其勞動者先痃作動而後成急用千金敗毒飲後用當歸瓜蔞散內消之成膿用乳香拔毒膏不用刀針第四十五形圖此圖有二症上名囊癰又名腎疽下名撩膝疽腳骨疔腎疽陰囊下硬腫受腎膀胱之寒濕而成急用千金托裡散外用紅子膏撩膝疽腳骨疔皆發於腎治法大同第四十六形圖此圖有五症上名腦心發鱔貢頭頸後雙發中背搭下名腎俞命門毒腦心發此熱毒上攻四邊焮赤腫硬連於耳項寒熱疼痛乃毒入腦血腐腦頂門而出不住者死發時急服追疔奪命湯四五帖後服千金托裡散總之頭中出血氣急痰發者危鱔貢頭又名白禿瘡頭匕少節愈而復發或濕或干如諸不應即用仙方二青草末飛丹散杆成膏貼吸出膿不五七日連藥自落水乾再貼頸後雙發治法與對口疽同中背搭治法與右上搭同腎俞命門毒治法與第六形圖同第四十七形圖此圖有四症名曰枷口疽又名馬刀瘡又名缺盆疽又名鎖骨疽總之自肩至頭或流缺盆乃手足少陽經在頰下或頰車乃陽明經受心脾之邪而作也此貪酒色及怒氣之郁榮衛虛衰日夜骨蒸熱攻至面頸項胸間急用二十四味流氣飲外敷鐵箍散再服連翹散化堅湯如不散再服千金化毒湯乳香沉香丁香木香麝香五香散第四十八形圖此圖共十二症逐一開列於後頂門癰受毒攻心陰陽不和熱氣上壅風熱傷於督脈太陽急用追毒流氣飲後用內托流氣飲或當歸連翹散解毒散瘡上用蟾酥丸四邊敷木香拔毒散如潰爛用追毒烏金散去其惡肉以桃花散收功赤面疔脾經受毒血凝氣滯傷於筋骨毒氣傷肝風熱塞盛先用狗寶丸次用追毒流氣飲外用白玉膏貼之耳風毒肝腎風熱上壅先服清肝流氣飲定痛流氣飲若耳痛目暈先用針刺破耳後用紅玉膏貼之肩疽肝腎膀胱受邪氣血凝不得流散先用流氣飲千金內托飲四邊以清涼膏敷貼中間用追毒膏眉發疽肝腎受邪血凝氣滯治法同上螻蛄串有上中下三種濕毒傷腎怒氣傷肝先用加味流氣飲經服三香內托飲後用乳香定痛散肚肋癰大小腸受毒而成內用加味內托清氣飲腎氣遊毒膀胱氣欲傷腎腎實不受複流膀胱蓋風毒也用定痛流氣飲內托散鞋帶癰寒濕受於下部用定痛流氣頌內托散檳榔丸腳心疽濕氣凝於腎經服定痛流氣飲檳榔丸第四十九形圖此圖上發背心肝鬱結怒氣傷肝熱毒出背先服敗毒流氣飲不效用護心托裡散再不效急用內托流氣飲中發背心經熱毒以致肝血凝結先用敗毒流氣飲次用內托流氣飲下發背肝脾風熱結滯入腎先用敗毒流氣飲次服內托流氣飲腰疽胸隔受濕熱之邪注於肝治法同下發背痄腮痛在耳根後通於脾腎因血氣凝滯結於夾腮乃風熱之毒也服清肝流氣飲內托流氣飲騎馬癰因腎虛受濕熱邪毒於腸經發即成漏急服敗毒流氣飲內托流氣飲追毒流氣飲第五十形圖此圖眉風毒太陽風熱上壅脾經壅結而成急用敗毒流氣飲次用內托清肝飲及乳定痛散耳門癰肝經風毒流注陽明用敗毒清氣飲清肝流氣飲耳根毒用敗毒流氣飲內托清肝飲胺癰怒氣傷肝肝風熱毒塞流入心腎用敗毒流氣飲內托清肝飲大腰帶毒心肝風濕熱毒注於膀胱腎經用清肝流氣飲敗毒流氣飲不可用敷藥臍痛心脾濕熱流入小腸發於臍中用內托流氣飲定痛三香飲中肘疽肝經氣血凝滯用內托流氣飲定痛消毒飲丁刺毒心邪結滯風毒壅血先用內托流氣飲次用定痛消毒飲腿癰濕熱窒結腎經用敗毒流氣飲內托流氣飲外臁瘡心脾腎之濕熱也先用紫蘇流氣飲次用三香和氣飲里臁瘡浸濕熱三邪陰經血分受傷急用紫蘇流氣飲三香和氣飲外用隔紙膏腳發背腎經受濕血氣凝滯用定痛消毒飲鵝油透骨膏第五十一形圖此圖腦疽腎虛熱上壅結急用三香內托散再用定痛消毒飲對口疽太陽督脈風熱相乘用三香內托散定痛消毒飲上中下搭手久憂暴怒傷於內風熱暑濕感於外心火無肺氣結血凝用三香內托散內托流氣飲消毒內托散委中毒腎經寒濕用加減紫蘇流氣飲敗