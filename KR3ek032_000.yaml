井水調敷追風流氣飲紫蘇桔梗枳殼當歸川芎白芷柴胡防風羌活獨活犀角芍藥連翹甘草上等分水煎服洗毒散麻黃地骨皮蛇床子紫花地丁煎湯溫沐當歸黃耆散噹噹黃耆銀花芍藥大黃陳皮紫花地丁甘草上等分姜三片水煎服乳香輕粉散乳香一兩白礬三錢輕粉五錢沒藥一兩麝香五分上共為末敷瘡口消風散荊芥穗炙草人參白殭蠶白茯苓防風川芎藿香蟬退各二兩陳皮厚朴薑製羌活各五分上共為細末每服三錢清茶調下此藥治一切風熱癬疥瘙癢發熱或頭皮腫痛頭目昏眩鼻流清水噴嚏聲重耳嗚諸疝鴉陷麝香輕粉散枯礬五分輕粉紅丹各一錢麝香少許老鴉毛燒灰存性五分上為末敷之鐵粉散紅丹一兩生鐵粉二兩輕粉五錢松香五錢麝香一分上為細末清油調貼追毒烏金散巴豆五錢寒食麵一兩金墨一錠面用水調糊狀包於巴豆之外文武火燒黑研末干敷追毒散巴豆五錢雄黃三錢綠豆粉一兩共為細末調敷針頭散人信五分乳香三錢沒藥二錢上為細末敷瘡口麝香輕粉散輕粉五錢乳香一兩沒藥一兩麝香五分飛礬五錢上為末敷之黃耆丸黃耆一兩附子四錢茴香七錢兔絲子一兩五錢上細末酒糊為丸如聖膏巴豆三錢當歸五錢輕粉二錢上細末清油八兩熬至滴水成珠去渣入黃丹三兩文武火收之此膏治一切風疳疥癬痛癢惡瘡終年不愈者乳香蓽茇散乳香天麻防風草烏蓽茇細辛川芎硼砂薄荷麝香上水煎口噙升麻和氣飲當歸陳皮各一錢五分枳殼麵炒芍藥酒炒半夏制桔梗炒白芷乾葛白茯苓炙草各一錢乾薑炒大黃各五分升麻三分蒼朮米泔麥酒炒一錢水煎服又乳香黃耆散乳香沒藥各五分黃耆去殼人參甘草川芎歸身芍藥陳皮麻黃各一錢粟殼去筋膜蜜炒一錢上煎服此方治一切癰疽發背諸毒疔瘡疼痛不可忍者未成者速散已成者速潰腐敗膿毒不假刀砭其惡肉自然脫落並治打撲損傷筋骨疼痛神應膏蛇退三條發灰乳香沒藥雄黃血竭各一兩當歸防風羌活獨活木鱉各一兩上入油一斤加豬脊髓桃柳槐枝熬油焦黑濾起再入鍋內加黃丹半斤收好備用又如聖散川芎桔梗薄荷硼砂甘草上為末敷瘡口玉屑妙靈散滑石研細為粉每服一錢煎木通湯送下香膽散木香一錢黃丹枯礬各五錢輕粉二錢上藥為細末用豬膽汁拌勻曬乾再研細搽患處黃耆湯治瘡退風濕熱黃耆銼黃芩去黑心麥冬去心焙芍藥各一兩甘草炙銼五錢生地四兩半夏五錢當歸四兩大黃銼炒石膏碎川芎人參各一兩上銼如麻豆每服五錢用水一盞半竹葉七片煎至一盞去渣空心溫服又乳香定痛散治諸瘡疼痛潰爛諸藥不應有效乳香沒藥各二錢滑石寒水石煅各四錢冰片一分上為細末搽患處痛即止又內消散銀花知母貝母天花粉白芨半夏穿山甲皂角刺乳香各一錢上水酒各一碗煎八分病在上飯後服病在下飯前服藥渣搗爛加芙蓉葉細末一兩白蜜五匙同調敷瘡上一宿自消重者再用一服忌口立效附羅氏保主錠治疔瘡發背瘰癧及一切惡瘡金腳信輕粉各二錢雄黃硇砂各三錢麝香一錢五分蟾酥一錢巴豆四十九粒另研文武火炮上藥研細末用黃蠟五錢熔開將藥末和成錠子冷水浸片時取出錠子捏作餅子如銅錢大將瘡頭撥破每用一餅次用種應膏後用托裡散若瘡毒入腹危者服破骨丹世傳疔瘡心有一條紅線所至之處針出血然後敷藥
