front:
  text: 原序余少學琴書雅不請醫術自己未篆渠歲華五易年來頻與四物六君於交跡復染瘡恙問醫渠城罕得明效偶於友人篋中胠獲枕藏外科一書傳者未審誰何而依方調治輒致痊愈猶以為偶己而患瘡症者靡不各收奇效始嘆是書之妙而神也萬世之若瘡患者甚夥脫僅秘之私囊毋乃非薄濟之昔袁了凡先生功過格云傳人一方不淺遂有刊播志客有詰者人用心已但古醫書之傳必出不朽故叔和扁鵲輩至今膾炙人口此書名或尋常方士浪傳世中似未刊付梓而知方無音乎期於響應古來方書充棟鮮有如指畫覼縷而靈應不爽者則非庸手能辨可決奚必標名榜字始號神醫哉客唯而退力請公世余因於薄書之暇照式繪形注病於前注方於後捐金鐫板葺為一書俾患者觸目朗然仿依療治自收成效未必非濟世之一助也其中字跡間有舛訛姑存而不論庶幾郭公夏五之遺意云長夏河扎李云驌良齋氏謹識
